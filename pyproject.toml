[build-system]
requires = ["setuptools>=75"]
build-backend = "setuptools.build_meta"

[project]
name = "voxelscout"
version = "0.1.0"
description = "Coarse-to-fine 3D vertebra localization and segmentation"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
  "nibabel>=5.3,<6",
  "numpy>=2.0,<3",
  "matplotlib>=3.10,<4",
]

[project.scripts]
voxelscout-inspect = "voxelscout.inspect_case:main"
voxelscout-inventory = "voxelscout.build_inventory:main"

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
